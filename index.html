<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>WILD CARD — Bosses del Reino Oscuro (B&N)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;background:#000;overflow:hidden;display:flex;
    align-items:center;justify-content:center;font-family:'VT323',monospace;touch-action:none;user-select:none}
  #stage{position:relative;width:min(100vw,133.333vh);aspect-ratio:4/3}
  canvas{width:100%;height:100%;display:block;image-rendering:pixelated;image-rendering:crisp-edges;background:#000}
  #touch{display:none}
  body.touch #touch{display:block}
  #touch .pad{position:fixed;bottom:18px;left:14px;z-index:10;display:grid;
    grid-template-columns:repeat(3,56px);grid-template-rows:repeat(3,56px);gap:6px;opacity:.78}
  #touch .btns{position:fixed;bottom:30px;right:18px;z-index:10;display:flex;gap:14px;opacity:.85}
  #touch button{border:3px solid #fff;background:rgba(40,40,40,.55);color:#fff;
    font-family:'Press Start 2P',monospace;font-size:14px;border-radius:12px;width:56px;height:56px;touch-action:none}
  #touch .btns button{width:68px;height:68px;border-radius:50%;font-size:18px}
  #touch button:active{background:rgba(255,255,255,.35)}
  #touch .pad .e{visibility:hidden}
</style>
</head>
<body>
<div id="stage"><canvas id="game" width="640" height="480"></canvas></div>
<div id="touch">
  <div class="pad">
    <button class="e"></button><button data-k="up">▲</button><button class="e"></button>
    <button data-k="left">◀</button><button class="e"></button><button data-k="right">▶</button>
    <button class="e"></button><button data-k="down">▼</button><button class="e"></button>
  </div>
  <div class="btns"><button data-k="confirm">Z</button><button data-k="cancel">X</button></div>
</div>

<script>
"use strict";
/* =====================================================================
   DARK BATTLES — combate estilo Deltarune en BLANCO Y NEGRO
   Kris · Susie · Ralsei contra los jefes (Lancer, King, Jevil).
   Todo dibujado por código. Offline. PC + móvil.
   ===================================================================== */
const cv=document.getElementById('game'), ctx=cv.getContext('2d');
const W=640,H=480; ctx.imageSmoothingEnabled=false;
const BOSSX=320, BOSSY=158;   // jefe centrado arriba (estilo Deltarune)
const IS_TOUCH=('ontouchstart'in window)||navigator.maxTouchPoints>0;
if(IS_TOUCH) document.body.classList.add('touch');

/* paleta B&N */
const C={ blk:'#000', wht:'#fff', g1:'#cfcfcf', g2:'#9a9a9a', g3:'#666', g4:'#3a3a3a' };

/* ---------------- CARGA DE IMÁGENES (opcional) ----------------
   Si pones archivos en la carpeta assets/ (kris.png, susie.png,
   ralsei.png, lancer.png, king.png, jevil.png) el juego los usará
   automáticamente (a color, sin fondo). Si no, usa los dibujos.
   MÚSICA: pon assets/music.mp3 y sonará en bucle al empezar. */
const IMG={};
const ASSET_LIST={kris:'assets/kris.png',susie:'assets/susie.png',ralsei:'assets/ralsei.png',
  lancer:'assets/lancer.png',king:'assets/king.png',jevil:'assets/jevil.png',
  rouxls:'assets/rouxls.png',queen:'assets/queen.png',spamton:'assets/spamton.png',spamtonneo:'assets/spamtonneo.png'};
(function loadAssets(){ for(const k in ASSET_LIST){ const im=new Image();
  im.onload=()=>{ if(im.naturalWidth>0) IMG[k]=im; }; im.onerror=()=>{}; im.src=ASSET_LIST[k]; } })();
/* fotogramas de IDLE de batalla (ripeados de los spritesheets oficiales):
   assets/anim/<key>_<n>.png. Se cargan en orden y se ciclan para animar. */
const ANIM={kris:[],susie:[],ralsei:[]};
(function loadAnim(){ for(const k in ANIM){ for(let i=0;i<8;i++){
  (function(k,i){ const im=new Image();
    im.onload=()=>{ if(im.naturalWidth>0) ANIM[k][i]=im; }; im.onerror=()=>{};
    im.src='assets/anim/'+k+'_'+i+'.png'; })(k,i); } } })();
// velocidad de idle de cada héroe (LENTA = respiración serena, no "baile")
const HERO_FPS={kris:2.6, susie:2.8, ralsei:1.7};
// devuelve el fotograma de idle actual de un héroe (o el sprite único de respaldo).
// Usa vaivén (ping-pong) para que no "salte" al primer cuadro: 0→1→2→1→0…
function heroImg(key,t,fps){ const arr=ANIM[key];
  if(arr){ const a=arr.filter(Boolean); if(a.length){
    if(a.length===1) return a[0];
    const f=fps||HERO_FPS[key]||2.4, span=a.length*2-2;
    let i=Math.floor((t||0)*f)%span; if(i>=a.length) i=span-i;
    return a[i]; } }
  return IMG[key]; }
// (la música ahora es sintetizada por jefe; ver el motor "Music" más abajo)
// dibuja un sprite a COLOR, crujiente, con leve "respiración" y bob (vida)
function drawSprite(img,cx,cy,maxH,t,opt){ opt=opt||{};
  const breathe=1+Math.sin((t||0)*2)*0.02;
  const sc=maxH/img.height*breathe, w=img.width*sc, h=img.height*sc;
  const bob=Math.sin((t||0)*2)*(opt.bob!=null?opt.bob:4);
  ctx.save(); ctx.imageSmoothingEnabled=false;
  if(opt.shadow){ ctx.fillStyle='rgba(0,0,0,.4)'; ctx.beginPath();
    ctx.ellipse(cx,cy+h/2+bob-2,w*0.32,h*0.05,0,0,7); ctx.fill(); }
  ctx.drawImage(img, cx-w/2, cy-h/2+bob, w, h); ctx.restore(); }
function drawBoss(key,cx,cy,t,scl){ scl=scl||1;
  if(IMG[key]) drawSprite(IMG[key],cx,cy,188*scl,t,{shadow:true});
  else { ctx.save(); ctx.translate(cx,cy); ctx.scale(scl,scl); BOSS_SPRITE[key](0,0,t); ctx.restore(); } }

/* ---------------- ENTRADA ---------------- */
const keys={}, pressed={};
const MAP={ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down',
  KeyA:'left',KeyD:'right',KeyW:'up',KeyS:'down',
  KeyZ:'confirm',Enter:'confirm',Space:'confirm',
  KeyX:'cancel',ShiftLeft:'cancel',ShiftRight:'cancel',Backspace:'cancel'};
function setKey(k,v){ if(v){ if(!keys[k]) pressed[k]=true; keys[k]=true;} else keys[k]=false; }
addEventListener('keydown',e=>{const k=MAP[e.code]; if(k){setKey(k,true); e.preventDefault();}});
addEventListener('keyup',e=>{const k=MAP[e.code]; if(k){setKey(k,false); e.preventDefault();}});
document.querySelectorAll('#touch button[data-k]').forEach(b=>{
  const k=b.dataset.k, d=e=>{e.preventDefault();setKey(k,true);}, u=e=>{e.preventDefault();setKey(k,false);};
  b.addEventListener('touchstart',d,{passive:false}); b.addEventListener('touchend',u,{passive:false});
  b.addEventListener('touchcancel',u,{passive:false}); b.addEventListener('mousedown',d);
  b.addEventListener('mouseup',u); b.addEventListener('mouseleave',u);
});
const jp=k=>!!pressed[k];
const clearPressed=()=>{for(const k in pressed)pressed[k]=false;};

/* ---------------- AUDIO ---------------- */
let AC=null; const ac=()=>{ if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} return AC; };
function beep(f,d,t='square',v=.05){ const a=ac(); if(!a)return;
  const o=a.createOscillator(),g=a.createGain(); o.type=t; o.frequency.value=f; g.gain.value=v;
  o.connect(g); g.connect(a.destination); o.start();
  g.gain.exponentialRampToValueAtTime(.0001,a.currentTime+d); o.stop(a.currentTime+d+.02); }
const sfx={ blip(){beep(380+Math.random()*60,.03,'square',.035);}, move(){beep(740,.05);},
  sel(){beep(620,.07);}, hurt(){beep(150,.18,'sawtooth',.09);}, slash(){beep(880,.05);setTimeout(()=>beep(480,.09),45);},
  graze(){beep(1200,.02,'sine',.03);}, heal(){beep(660,.1);setTimeout(()=>beep(880,.12),90);},
  magic(){[440,587,740].forEach((f,i)=>setTimeout(()=>beep(f,.09,'triangle',.06),i*60));},
  spare(){beep(523,.1);setTimeout(()=>beep(659,.1),90);setTimeout(()=>beep(784,.16),180);},
  win(){[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.14),i*110));} };

/* ---------------- MÚSICA SINTETIZADA (un tema por jefe) ----------------
   Motor chiptune sencillo con planificador "look-ahead". Cada tema es un
   conjunto de pistas (lead/bass/arp/drums); cada pista es un array de pasos
   (semicorcheas). Valores: nota tipo "A4", '.' = silencio. Las pistas pueden
   tener distinta longitud (se repiten en bucle). 'k' bombo, 's' caja, 'h' hi-hat. */
const NOTE={}; (function(){ const nm=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  for(let o=1;o<7;o++) for(let i=0;i<12;i++){ NOTE[nm[i]+o]=440*Math.pow(2,(o*12+i-57)/12); } })();

const Music={
  master:null, timer:null, theme:null, step:0, nextT:0, lookahead:25, ahead:0.12, vol:0.38,
  ensure(){ const a=ac(); if(!a) return null;
    if(!this.master){ this.master=a.createGain(); this.master.gain.value=0.0001;
      // filtro paso-bajo: redondea las ondas cuadradas para una calidez tipo cartucho
      this.filter=a.createBiquadFilter(); this.filter.type='lowpass'; this.filter.frequency.value=2700; this.filter.Q.value=0.6;
      this.master.connect(this.filter); this.filter.connect(a.destination); }
    return a; },
  blip(a,freq,start,dur,type,vol,glide){ const o=a.createOscillator(),g=a.createGain();
    o.type=type||'square'; o.frequency.setValueAtTime(freq,start);
    if(glide) o.frequency.exponentialRampToValueAtTime(freq*glide,start+dur);
    g.gain.setValueAtTime(0.0001,start); g.gain.exponentialRampToValueAtTime(vol,start+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,start+dur);
    o.connect(g); g.connect(this.master); o.start(start); o.stop(start+dur+0.03); },
  drum(a,kind,start){ if(kind==='k'){ this.blip(a,118,start,0.14,'sine',0.6,0.34); return; }
    const dur=kind==='s'?0.13:0.03, n=Math.max(1,(a.sampleRate*dur)|0);
    const buf=a.createBuffer(1,n,a.sampleRate), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/n,2);
    const s=a.createBufferSource(); s.buffer=buf; const g=a.createGain(); g.gain.value=kind==='s'?0.32:0.10;
    s.connect(g); g.connect(this.master); s.start(start); s.stop(start+dur); },
  start(theme){ const a=this.ensure(); if(!a||!theme) return; this.stop(true); this.theme=theme; this.step=0;
    this.nextT=a.currentTime+0.07;
    this.master.gain.cancelScheduledValues(a.currentTime);
    this.master.gain.setValueAtTime(0.0001,a.currentTime);
    this.master.gain.exponentialRampToValueAtTime(this.vol,a.currentTime+0.6);
    this.timer=setInterval(()=>this.sched(),this.lookahead); },
  stop(hard){ if(this.timer){ clearInterval(this.timer); this.timer=null; } this.theme=null;
    const a=AC; if(a&&this.master){ const v=Math.max(0.0001,this.master.gain.value);
      this.master.gain.cancelScheduledValues(a.currentTime); this.master.gain.setValueAtTime(v,a.currentTime);
      this.master.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(hard?0.05:0.28)); } },
  sched(){ const a=AC, th=this.theme; if(!a||!th) return; const L=th.lead.length, sd=(60/th.tempo)/4;
    while(this.nextT < a.currentTime + this.ahead){ const s=this.step%L, t=this.nextT;
      const trk=(arr,type,vol,glide,sus)=>{ if(!arr)return; const v=arr[s%arr.length];
        if(v&&v!=='.'){ const f=NOTE[v]; if(f) this.blip(a,f,t,sd*(sus||0.9),type,vol,glide); } };
      trk(th.lead, th.leadType||'square', 0.17, th.glide, th.leadSus);
      trk(th.bass, th.bassType||'triangle', 0.22, 0, 0.95);
      trk(th.arp, 'square', 0.07, 0, 0.6);
      trk(th.pad, 'triangle', 0.05, 0, 1.6);   // capa de acordes sostenidos (cuerpo/armonía)
      if(th.drums){ const d=th.drums[s%th.drums.length]; if(d&&d!=='.') this.drum(a,d,t); }
      this.nextT+=sd; this.step++; } },
  // fanfarria de aparición (se superpone al inicio del tema)
  fanfare(){ const a=this.ensure(); if(!a) return; const t0=a.currentTime+0.02;
    [['E4',0],['A4',0.09],['C5',0.18],['E5',0.27]].forEach(([n,d])=>this.blip(a,NOTE[n],t0+d,0.22,'square',0.16,1));
    this.blip(a,NOTE['A2'],t0,0.5,'sawtooth',0.18); },
  // jingle final (victoria o perdón)
  victory(spared){ const a=this.ensure(); if(!a) return; const t0=a.currentTime+0.04;
    const seq = spared ? [['C5',0],['E5',0.13],['G5',0.26],['C6',0.42],['G5',0.6]]
                       : [['G4',0],['C5',0.12],['E5',0.24],['G5',0.36],['C6',0.5]];
    seq.forEach(([n,d])=>this.blip(a,NOTE[n],t0+d,0.3,'square',0.2,1));
    this.blip(a,NOTE['C3'],t0,0.7,'triangle',0.2); },
  gameover(){ const a=this.ensure(); if(!a) return; const t0=a.currentTime+0.04;
    [['A4',0],['F4',0.22],['D4',0.44],['A3',0.7]].forEach(([n,d])=>this.blip(a,NOTE[n],t0+d,0.4,'sawtooth',0.18,0.97)); }
};

/* ---------------- MÚSICA REAL DEL USUARIO (opcional) ----------------
   Si pones tu archivo en assets/music/<jefe>.mp3 (o .ogg / .wav) el juego
   reproducirá ESA pista en bucle y silenciará la sintetizada. Si no existe,
   se queda la música chiptune. Claves: lancer, rouxls, king, jevil, queen,
   spamton, spamtonneo, win. (No incluyo audio con copyright; pon el tuyo.) */
const BossAudio={ el:null, cur:null,
  tryPlay(key,onOk){ this.stop(); this.cur=key;
    const a=new Audio(); a.loop=true; a.volume=0.55; a.preload='auto';
    const exts=['.ogg','.mp3','.wav']; let i=0;
    const next=()=>{ if(i>=exts.length){ return; } a.src='assets/music/'+key+exts[i++]; a.load(); };
    a.addEventListener('canplaythrough',()=>{ if(this.cur!==key) return;
      a.play().then(()=>{ this.el=a; onOk&&onOk(); }).catch(()=>{}); }, {once:false});
    a.addEventListener('error',()=>{ if(this.cur===key) next(); });
    next(); },
  stop(){ this.cur=null; if(this.el){ try{ this.el.pause(); }catch(e){} this.el=null; } } };
// Arranca la música de un jefe: synth de respaldo + intento de pista real.
function startBossMusic(key){
  Music.start(THEMES[key]||THEMES.lancer);
  BossAudio.tryPlay(key, ()=>{ Music.stop(true); });   // si hay archivo real, calla el synth
}
function stopAllMusic(hard){ BossAudio.stop(); Music.stop(hard); }

/* Temas por jefe: tempo + pistas. Cada uno con su "vibra". */
const THEMES={
  lancer:{ tempo:142, leadType:'square', bassType:'triangle',
    lead:['A4','.','C5','.','E5','.','D5','C5','B4','.','A4','.','C5','.','E5','.'],
    bass:['A2','.','A2','.','F2','.','F2','.','G2','.','G2','.','E2','.','E2','.'],
    drums:['k','.','h','.','s','.','h','.','k','.','h','.','s','.','h','h'] },
  rouxls:{ tempo:118, leadType:'sawtooth', bassType:'triangle',
    lead:['D4','.','F4','A4','.','F4','D4','.','A4','.','G4','.','F4','.','E4','.'],
    bass:['D2','.','D2','.','A2','.','A2','.','A#2','.','A#2','.','A2','.','A2','.'],
    drums:['k','.','.','h','s','.','.','h','k','.','.','h','s','.','h','.'] },
  king:{ tempo:96, leadType:'sawtooth', bassType:'sawtooth', leadSus:0.8,
    lead:['C3','.','.','.','D#3','.','.','.','G3','.','F3','.','D#3','.','D3','.'],
    bass:['C2','.','.','.','C2','.','.','.','G2','.','.','.','G2','.','.','.'],
    drums:['k','.','.','.','s','.','.','.','k','.','.','.','s','.','.','k'] },
  jevil:{ tempo:172, leadType:'square', bassType:'triangle', glide:0,
    lead:['E5','F5','E5','D#5','E5','B4','D5','C5','A4','.','A4','B4','C5','D5','E5','.',
          'E5','F5','E5','D#5','E5','B4','D5','C5','F5','.','E5','.','D5','.','C5','.'],
    bass:['A2','A2','E2','E2','A2','A2','G2','G2','F2','F2','C2','C2','E2','E2','E2','E2'],
    drums:['k','h','s','h','k','h','s','h'] },
  queen:{ tempo:126, leadType:'square', bassType:'sawtooth',
    lead:['E4','.','G4','.','B4','.','A4','G4','F#4','.','E4','.','B4','.','D5','.'],
    bass:['E2','.','B2','.','C3','.','B2','.','A2','.','E2','.','F#2','.','B2','.'],
    drums:['k','.','h','h','s','.','h','.','k','.','h','h','s','h','.','h'] },
  spamton:{ tempo:152, leadType:'square', bassType:'sawtooth',
    lead:['C5','.','C#5','C5','.','G4','.','A#4','C5','.','.','D#5','.','C5','G4','.'],
    bass:['F2','.','F2','F2','.','C2','.','C2','F2','.','.','F2','.','C2','.','.'],
    drums:['k','h','.','s','h','k','.','s','k','h','.','s','h','.','s','h'] },
  spamtonneo:{ tempo:176, leadType:'sawtooth', bassType:'sawtooth',
    lead:['A4','B4','C5','E5','.','C5','E5','A5','G5','E5','C5','E5','.','D5','B4','.',
          'A4','B4','C5','E5','.','E5','A5','.','B5','.','A5','.','G5','.','E5','.'],
    bass:['A2','A2','A2','A2','F2','F2','F2','F2','G2','G2','G2','G2','E2','E2','E2','E2'],
    pad:['A3','.','.','.','.','.','.','.','F3','.','.','.','.','.','.','.',
         'G3','.','.','.','.','.','.','.','E3','.','.','.','.','.','.','.'],
    drums:['k','s','k','s','k','s','k','s'] },
  win:{ tempo:128, leadType:'square', bassType:'triangle',
    lead:['C5','E5','G5','C6','.','G5','.','E5','F5','A5','.','G5','.','E5','.','C5'],
    bass:['C3','.','G2','.','F2','.','G2','.','A2','.','E2','.','F2','.','G2','.'],
    drums:['k','.','h','.','s','.','h','.','k','.','h','.','s','.','h','h'] }
};

/* ---------------- FORMAS (palos de baraja) ---------------- */
function heart(cx,cy,s,fill){ ctx.fillStyle=fill; ctx.beginPath();
  ctx.moveTo(cx,cy-s*.25);
  ctx.bezierCurveTo(cx,cy-s*.65,cx-s*.9,cy-s*.85,cx-s*.9,cy-s*.22);
  ctx.bezierCurveTo(cx-s*.9,cy+s*.28,cx,cy+s*.55,cx,cy+s*.9);
  ctx.bezierCurveTo(cx,cy+s*.55,cx+s*.9,cy+s*.28,cx+s*.9,cy-s*.22);
  ctx.bezierCurveTo(cx+s*.9,cy-s*.85,cx,cy-s*.65,cx,cy-s*.25); ctx.fill(); }
function spade(cx,cy,s,fill,stroke){ ctx.beginPath();
  ctx.moveTo(cx,cy-s);
  ctx.bezierCurveTo(cx+s*1.0,cy+s*.05,cx+s*1.05,cy+s*.55,cx+s*.42,cy+s*.55);
  ctx.bezierCurveTo(cx+s*.15,cy+s*.55,cx+s*.12,cy+s*.4,cx+s*.18,cy+s);
  ctx.lineTo(cx-s*.18,cy+s);
  ctx.bezierCurveTo(cx-s*.12,cy+s*.4,cx-s*.15,cy+s*.55,cx-s*.42,cy+s*.55);
  ctx.bezierCurveTo(cx-s*1.05,cy+s*.55,cx-s*1.0,cy+s*.05,cx,cy-s);
  if(fill){ctx.fillStyle=fill;ctx.fill();} if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();} }
function diamond(cx,cy,s,fill,stroke){ ctx.beginPath();
  ctx.moveTo(cx,cy-s); ctx.lineTo(cx+s*.72,cy); ctx.lineTo(cx,cy+s); ctx.lineTo(cx-s*.72,cy); ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();} if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();} }
function club(cx,cy,s,fill){ ctx.fillStyle=fill;
  ctx.beginPath(); ctx.arc(cx,cy-s*.35,s*.45,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(cx-s*.42,cy+s*.2,s*.45,0,7); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+s*.42,cy+s*.2,s*.45,0,7); ctx.fill();
  ctx.fillRect(cx-s*.13,cy,s*.26,s); }
// degradado radial para dar volumen (luz arriba-izq)
function rg(cx,cy,r,inner,outer){ const g=ctx.createRadialGradient(cx-r*.32,cy-r*.32,r*.1,cx,cy,r);
  g.addColorStop(0,inner); g.addColorStop(1,outer); return g; }

/* =====================================================================
   SPRITES DE PERSONAJES Y JEFES (blanco y negro)
   ===================================================================== */
function drawKris(x,y,s,down){ ctx.save(); ctx.translate(x,y);
  if(down){ ctx.globalAlpha=.4; }
  // pelo
  ctx.fillStyle=C.g4; ctx.beginPath(); ctx.ellipse(0,-s*.9,s*.7,s*.55,0,0,7); ctx.fill();
  // cara

function drawLancer(cx,cy,t){ const bob=Math.sin(t*2)*4; cy+=bob;

  ctx.save(); ctx.translate(cx,cy+60);
  ctx.fillStyle=rg(0,0,34,C.g2,C.blk); ctx.beginPath(); ctx.arc(0,0,33,0,7); ctx.fill();
  ctx.strokeStyle=C.g1; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(0,0,33,0,7); ctx.stroke();
  ctx.strokeStyle=C.g2; ctx.lineWidth=3;
  for(let i=0;i<8;i++){ const a=t*4+i/8*Math.PI*2; ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*29,Math.sin(a)*29); ctx.stroke(); }
  ctx.fillStyle=C.g1; ctx.beginPath(); ctx.arc(0,0,6,0,7); ctx.fill(); ctx.restore();
  // capa
  ctx.fillStyle=rg(cx,cy+24,48,C.g3,C.g4); ctx.beginPath(); ctx.moveTo(cx,cy-6);
  ctx.lineTo(cx-40,cy+50); ctx.quadraticCurveTo(cx,cy+40,cx+40,cy+50); ctx.closePath(); ctx.fill();
  // cuerpo con degradado
  const bg=ctx.createLinearGradient(cx-18,0,cx+18,0); bg.addColorStop(0,C.g2); bg.addColorStop(.55,C.g4); bg.addColorStop(1,C.blk);
  ctx.fillStyle=bg; ctx.fillRect(cx-18,cy-2,36,44);
  ctx.fillStyle=C.g1; ctx.beginPath(); ctx.arc(cx,cy+14,3,0,7); ctx.arc(cx,cy+27,3,0,7); ctx.fill();
  // brazos con manos
  ctx.strokeStyle=C.g4; ctx.lineWidth=8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx-15,cy+8); ctx.lineTo(cx-28,cy+22); ctx.moveTo(cx+15,cy+8); ctx.lineTo(cx+30,cy+15); ctx.stroke();
  ctx.fillStyle=C.g2; ctx.beginPath(); ctx.arc(cx-28,cy+22,5,0,7); ctx.arc(cx+30,cy+15,5,0,7); ctx.fill();
  // cabeza de espada (con volumen)
  spade(cx,cy-28,34,rg(cx,cy-30,32,C.g4,C.blk),C.wht);
  // cara
  ctx.fillStyle=C.wht; ctx.beginPath(); ctx.ellipse(cx-9,cy-30,5,7.5,0,0,7); ctx.ellipse(cx+9,cy-30,5,7.5,0,0,7); ctx.fill();
  ctx.fillStyle=C.blk; ctx.beginPath(); ctx.arc(cx-9,cy-29,2.4,0,7); ctx.arc(cx+9,cy-29,2.4,0,7); ctx.fill();
  ctx.strokeStyle=C.wht; ctx.lineWidth=3; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(cx-11,cy-16); ctx.quadraticCurveTo(cx,cy-7,cx+11,cy-16); ctx.stroke();
}

function drawJevil(cx,cy,t){ const bob=Math.sin(t*3)*6, sw=Math.sin(t*2)*0.15; cy+=bob;
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(sw);
  // cuerpo arlequín (rombos B&N)
  const bw=46,bh=58;
  ctx.save(); ctx.beginPath(); ctx.moveTo(0,-bh*.4); ctx.lineTo(bw*.7,bh*.2); ctx.lineTo(0,bh); ctx.lineTo(-bw*.7,bh*.2); ctx.closePath(); ctx.clip();
  for(let r=-2;r<6;r++) for(let c=-3;c<4;c++){ ctx.fillStyle=((r+c)%2===0)?C.wht:C.blk; const dx=c*16,dy=-bh*.4+r*16; diamond(dx,dy,11,((r+c)%2===0)?C.wht:C.g4); }
  ctx.restore();
  ctx.strokeStyle=C.wht; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,-bh*.4); ctx.lineTo(bw*.7,bh*.2); ctx.lineTo(0,bh); ctx.lineTo(-bw*.7,bh*.2); ctx.closePath(); ctx.stroke();
  // manos enguantadas
  ctx.fillStyle=C.wht; ctx.strokeStyle=C.blk; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(-bw*.78,bh*.18,9,0,7); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(bw*.78,bh*.18,9,0,7); ctx.fill(); ctx.stroke();
  // cara con volumen
  ctx.fillStyle=rg(0,-bh*.65,26,C.wht,C.g2); ctx.beginPath(); ctx.ellipse(0,-bh*.65,26,24,0,0,7); ctx.fill();
  // gorro de bufón
  for(const d of [-1,0,1]){ ctx.save(); ctx.translate(0,-bh*.9); ctx.rotate(d*0.7+Math.sin(t*4+d)*0.1);
    ctx.fillStyle=(d===0)?C.blk:C.wht; ctx.strokeStyle=C.blk; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(-8,0); ctx.lineTo(8,0); ctx.lineTo(0,-34); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillStyle=C.g2; ctx.beginPath(); ctx.arc(0,-36,5,0,7); ctx.fill(); ctx.restore(); }
  // ojos + gran sonrisa
  ctx.fillStyle=C.blk; ctx.beginPath(); ctx.ellipse(-9,-bh*.68,4,6,0,0,7); ctx.ellipse(9,-bh*.68,4,6,0,0,7); ctx.fill();
  ctx.beginPath(); ctx.moveTo(-15,-bh*.55); ctx.quadraticCurveTo(0,-bh*.4+8,15,-bh*.55); ctx.quadraticCurveTo(0,-bh*.5,-15,-bh*.55); ctx.fillStyle=C.blk; ctx.fill();
  ctx.fillStyle=C.wht; for(let i=-2;i<3;i++) ctx.fillRect(i*5-1.5,-bh*.56,3,4);
  ctx.restore(); }

  const gl=Math.floor(t*8)%7===0?2:0;

  ctx.fillStyle=C.wht; ctx.fillRect(cx-10+gl,cy-38,3,3); ctx.beginPath(); ctx.arc(cx+8,cy-36,1.6,0,7); ctx.fill();

function drawSpamtonNeo(cx,cy,t){ const bob=Math.sin(t*2)*5; cy+=bob;
  // alas mecánicas
  for(const s of [-1,1]){ ctx.strokeStyle=C.g2; ctx.lineWidth=4; ctx.lineCap='round';
    for(let i=0;i<4;i++){ const a=(-0.5+i*0.35)*s, len=66+i*5;

  ctx.strokeStyle=C.g2; ctx.lineWidth=2; ctx.strokeRect(cx-20,cy-22,40,56);
  // cabeza
  ctx.fillStyle=rg(cx,cy-36,18,C.g1,C.g2); ctx.beginPath(); ctx.ellipse(cx,cy-34,16,15,0,0,7); ctx.fill();
  const gl=Math.floor(t*10)%5===0?3:0;
  ctx.fillStyle=C.blk; ctx.fillRect(cx-11+gl,cy-40,8,8); ctx.beginPath(); ctx.arc(cx+7,cy-35,5,0,7); ctx.fill();

  ctx.fillStyle=C.wht; for(let i=-2;i<=2;i++) ctx.fillRect(cx+i*4-1,cy-26,2.5,4);

  // micrófono
  ctx.strokeStyle=C.g2; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(cx+24,cy+6); ctx.lineTo(cx+34,cy+22); ctx.stroke();
  ctx.fillStyle=rg(cx+24,cy+2,7,C.wht,C.g3); ctx.beginPath(); ctx.arc(cx+24,cy+2,7,0,7); ctx.fill(); }

function font(px,fam='VT323'){ ctx.font=px+'px "'+fam+'", monospace'; }
function wrap(text,maxW){ const ws=text.split(' '),L=[]; let l='';
  for(const w of ws){ const t=l?l+' '+w:w; if(ctx.measureText(t).width>maxW&&l){L.push(l);l=w;} else l=t; }
  if(l)L.push(l); return L; }

/* ---------- flujo ---------- */
function dialog(text,after){ G.state='DIALOG'; G.dlg=text; G.dlgShown=0; G.dlgAfter=after||null; }
function setBox(x,y,w,h){ G.boxT={x,y,w,h}; }
function clampSoul(){ const m=10,b=G.box;
  G.soul.x=Math.max(b.x+m,Math.min(b.x+b.w-m,G.soul.x));
  G.soul.y=Math.max(b.y+m,Math.min(b.y+b.h-m,G.soul.y)); }
function floater(x,y,txt,col){ G.floaters.push({x,y,txt,col,life:1.1}); }
function burst(x,y,n,col,opt){ opt=opt||{};
  for(let i=0;i<n;i++){ const a=(opt.a!=null?opt.a:Math.random()*6.283)+(Math.random()-.5)*(opt.spread!=null?opt.spread:6.283);
    const sp=(opt.sp||60)*(0.4+Math.random()*0.9);
    G.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:(opt.r||3)*(0.6+Math.random()*0.7),
      life:opt.life||0.6,max:opt.life||0.6,col:col||C.wht,g:opt.g||0}); } }

const BGSYM=[]; for(let i=0;i<20;i++) BGSYM.push({x:Math.random()*W,y:Math.random()*426,

function startBattle(i){
  G.bossIndex=i; G.floor=i; const d=BOSSES[i];
  buildParty();                                 // arma la party desde la selección, a vida máxima
  G.items=ITEMS_DEFAULT.map(o=>({...o})); G.tp=0;
  G.boss={...d, hp:d.max, friend:0, sparable:false, patIdx:0};
  G.bossFade=1; G.bossFlash=0; G.bullets=[]; G.warns=[]; G.round=0; G.defeatDone=false;
  G.bossEnter=1; G.bossKnock=0; G.bossPulse=0; G.flash=0.85;   // entrada dramática
  setBox(60,250,520,120); G.box={...G.boxT};
  G.soulMode='red'; G.soulVy=0; G.onGround=false;

}
function beginRound(){
  G.round++;
  G.party.forEach(p=>p.defending=false);
  G.order=G.party.map((p,i)=>i).filter(i=>!G.party[i].down);
  if(G.order.length===0){ setGameOver(); return; }
  G.cur=0; toCmd();
}
function toCmd(){ G.state='CMD'; G.menu=0; G.sub=0; setBox(60,250,520,120); }
const curMember=()=>G.party[G.order[G.cur]];

function nextMember(){
  G.cur++;
  if(G.cur>=G.order.length){ startEnemyTurn(); }
  else toCmd();
}

/* ---------- comprobaciones de perdón ---------- */
function refreshSpare(){ G.boss.sparable = G.boss.spareWhen(G.boss); }

   ===================================================================== */
/* perfil de ataque por personaje (tipos distintos de golpe) */
function atkProfile(m){ const k=m.key;
  if(k==='susie')  return {hits:2, speed:600, perfect:0.90, mult:1.00, label:'HACHA · COMBO x2'};
  if(k==='lancer') return {hits:2, speed:540, perfect:0.90, mult:0.95, label:'BICI · EMBESTIDA x2'};
  if(k==='kris')   return {hits:1, speed:520, perfect:0.95, mult:1.15, label:'TAJO PRECISO'};
  if(k==='jevil'||k==='spamton') return {hits:1, speed:700, perfect:0.93, mult:1.25, label:'CAOS'};
  if(k==='ralsei') return {hits:1, speed:460, perfect:0.90, mult:0.95, label:'GOLPE SUAVE'};
  return {hits:1, speed:540, perfect:0.92, mult:1.0, label:'ATAQUE'};
}
function doFight(){ const p=atkProfile(curMember());
  G.state='FIGHT'; G.fight={phase:'bar',x:G.box.x+14,dir:1,speed:p.speed,t:0,dmg:0,prof:p,hit:0,total:0,accs:[]}; }
function resolveFightBar(){ const b=G.box,f=G.fight, cx=b.x+b.w/2, p=f.prof;
  const acc=1-Math.min(1,Math.abs(f.x-cx)/(b.w/2));   // 0..1
  const m=curMember();
  let dmg=Math.round(m.atk*(2+acc*1.6)*p.mult*(0.9+Math.random()*0.2));
  const perfect=acc>p.perfect;
  if(perfect){ dmg=Math.round(m.atk*4.2*p.mult); floater(cx,b.y-6,'¡PERFECTO!','#ffd23f'); sfx.graze(); }
  G.tp=Math.min(100,G.tp+Math.round(acc*12));
  f.total+=dmg; f.accs.push(acc); f.hit++;
  if(f.hit<p.hits){ // siguiente golpe del combo (más rápido)
    f.phase='bar'; f.x=b.x+14; f.dir=1; f.t=0; f.speed*=1.28; sfx.slash();
  } else { f.dmg=f.total; f.acc=Math.max.apply(null,f.accs); f.phase='slash'; f.t=0; sfx.slash(); }
}
function hitBoss(dmg){
  G.boss.hp-=dmg; G.bossFlash=.35; G.shake=10; G.bossKnock=1; floater(BOSSX,BOSSY,String(dmg),C.wht);
  burst(BOSSX+(Math.random()-.5)*50,BOSSY+(Math.random()-.5)*60,16,C.wht,{sp:175,life:.5,r:3,g:260});
  if(G.boss.hp<=0){ G.boss.hp=0; refreshSpare();
    if(G.boss.key==='jevil'){ defeatBoss('spare'); }
    else if(G.boss.neo && !G.boss.isNeo){ transformToNeo(); }   // Spamton rompe sus hilos
    else defeatBoss('kill'); return true; }
  refreshSpare(); return false;
}
function defeatBoss(how){ G.result=how; G.state='DEFEAT'; G.t2=0; G.bullets=[]; G.fight=null; G.flash=0.9;
  for(let i=0;i<32;i++){ const a=i/32*6.283; burst(BOSSX,BOSSY,1,how==='spare'?C.g1:C.wht,{a,spread:0.15,sp:160,life:.95,r:3}); }
  stopAllMusic(); Music.victory(how==='spare');
  if(how==='spare') sfx.spare(); }
function setGameOver(){ G.state='GAMEOVER'; G.t2=0; stopAllMusic(); Music.gameover(); }

/* ---- Spamton rompe sus hilos y se transforma en SPAMTON NEO (misma pelea) ---- */
function transformToNeo(){ G.state='TRANSFORM'; G.t2=0; G.bullets=[]; G.warns=[]; G.fight=null;
  G.flash=1; G.shake=16; G.bossFade=1; stopAllMusic(true);
  for(let i=0;i<5;i++) setTimeout(()=>beep(110+i*46,.13,'sawtooth',.09), i*120); }
function applyNeo(){ const n=G.boss.neo;
  G.boss.isNeo=true; G.boss.key=n.key; G.boss.name=n.name;
  G.boss.max=n.hp; G.boss.hp=n.hp; G.boss.patterns=n.patterns.slice(); G.boss.dur=n.dur;
  G.boss.arena=n.arena; G.boss.line=n.line; G.boss.line2=n.line2; G.boss.patIdx=0;
  G.boss.sparable=false; G.boss.spareWhen=()=>false;
  G.bossEnter=0.9; G.bossPulse=1; }
function updTransform(dt){ G.t2+=dt; G.shake=Math.max(G.shake,4);
  if(G.t2>1.5 && !G.boss.isNeo){ applyNeo(); G.flash=1; Music.fanfare(); sfx.magic();
    burst(BOSSX,BOSSY,46,C.wht,{sp:230,life:1.0,r:4}); }
  if(G.t2>3.4){ startBossMusic(G.boss.key); dialog(G.boss.neo.intro, beginRound); } }

function castSpell(sp){
  if(G.tp<sp.tp){ dialog('No tienes suficiente TP para '+sp.name+'.', nextMember); return; }
  G.tp-=sp.tp;
  if(sp.type==='atk'){
    sfx.magic(); const dmg=Math.round(sp.power*(1.6+Math.random()*0.4));
    dialog(curMember().name+' usa '+sp.name+'.', ()=>{
      if(!hitBoss(dmg)) nextMember(); else {} // si muere, DEFEAT ya activo
    });
  } else if(sp.type==='healAll'){
    sfx.heal(); G.party.forEach(p=>{ if(!p.down) p.hp=Math.min(p.max,p.hp+sp.power); });
    dialog('Ralsei reza. ¡Toda la fiesta recupera '+sp.power+' PV!', nextMember);
  } else if(sp.type==='pacify'){
    sfx.magic();
    if(G.boss.sparable || G.boss.hp<=G.boss.max*0.4){ G.boss.sparable=true; dialog('Ralsei usa Pacify. El enemigo se calma...', ()=>defeatBoss('spare')); }
    else dialog('Ralsei usa Pacify, pero el enemigo aún tiene fuerzas.', nextMember);
  }
}

function useItem(idx){ const it=G.items[idx]; const m=curMember();
  if(m.down){ m.down=false; m.hp=it.heal; } else m.hp=Math.min(m.max,m.hp+it.heal);
  G.items.splice(idx,1); sfx.heal();
  dialog(m.name+' come '+it.name+'. +'+it.heal+' PV.', nextMember);
}

function doAct(actIdx){ const a=G.boss.acts[actIdx];
  if(a.friend) G.boss.friend+=a.friend; refreshSpare();
  let extra=''; if(G.boss.sparable) extra='  (¡'+G.boss.name+' puede ser PERDONADO!)';
  dialog(a.text+extra, nextMember);
}

function doSpare(){
  refreshSpare();
  if(G.boss.sparable){ defeatBoss('spare'); }
  else dialog('No puedes PERDONAR a '+G.boss.name+' todavía.', nextMember);
}

function doDefend(){ const m=curMember(); m.defending=true; G.tp=Math.min(100,G.tp+16);
  dialog(m.name+' se defiende. (+TP, daño reducido este turno.)', nextMember); }

   ===================================================================== */
/* dificultad progresiva: cada piso sube velocidad y daño de las balas */
function spdMul(){ return 1 + G.floor*0.05; }
function dmgMul(){ return 1 + G.floor*0.045; }
function spawn(o){ const b=Object.assign({r:6,dmg:6,shape:'spade',vx:0,vy:0,bounce:false,single:-1},o);
  const sm=spdMul(); b.vx*=sm; b.vy*=sm; b.dmg=Math.max(1,Math.round(b.dmg*dmgMul()));
  G.bullets.push(b); }

function makePattern(name,dur){
  let acc=0, acc2=0, sched=[];
  const b=()=>G.box, CX=()=>G.box.x+G.box.w/2, CY=()=>G.box.y+G.box.h/2;
  return { dur, update(dt,el){
    acc+=dt;
    // NEO entra en FRENESÍ bajo el 45% de vida: dispara mucho más rápido
    const FR=(G.boss&&G.boss.key==='spamtonneo'&&G.boss.hp<=G.boss.max*0.45)?0.6:1;
    switch(name){
      case 'lancerSpades':
        if(acc>0.4){ acc=0; const x=b().x+12+Math.random()*(b().w-24);
          spawn({x, y:b().y-12, vx:(Math.random()-.5)*30, vy:90, r:8, dmg:5, shape:'spade'}); } break;
      case 'lancerBike':
        if(acc>0.55){ acc=0; const fromLeft=Math.random()<.5; const y=b().y+20+Math.random()*(b().h-40);
          spawn({x:fromLeft?b().x-12:b().x+b().w+12, y, vx:fromLeft?120:-120, vy:0, r:7, dmg:5, shape:'diamond'}); } break;

      case 'kingChains': // barras horizontales que bajan con hueco
        if(acc>1.3){ acc=0; const gap=b().x+20+Math.random()*(b().w-90);
          for(let x=b().x+6;x<b().x+b().w-6;x+=14){ if(x>gap&&x<gap+70) continue;
            spawn({x, y:b().y-10, vx:0, vy:70, r:6, dmg:6, shape:'club'}); } } break;
      case 'kingLightning': // telegrafía y golpea columnas
        if(acc>1.1 && el<dur-1.2){ acc=0; const x=b().x+20+Math.random()*(b().w-40);
          G.warns.push({x, y:b().y, w:16, h:b().h, t:0.7, onEnd:()=>{
            spawn({x, y:b().y-8, vx:0, vy:420, r:7, dmg:8, shape:'diamond'}); }}); } break;
      case 'kingSpadeRain':
        if(acc>0.3){ acc=0; const x=b().x+10+Math.random()*(b().w-20);
          spawn({x, y:b().y-10, vx:(Math.random()-.5)*40, vy:130, r:7, dmg:6, shape:'spade', single:G.singleTarget}); } break;

      case 'jevilSpin':{ // espadas radiales rotando
        if(acc>0.12){ acc=0; const base=el*3.0; const n=3;
          for(let i=0;i<n;i++){ const a=base+i/n*Math.PI*2; const sp=110;
            spawn({x:CX(), y:CY(), vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, r:7, dmg:6, shape:'spade'}); } } break; }
      case 'jevilBounce':{ // diamantes que rebotan
        if(acc>0.7 && G.bullets.length<26){ acc=0; const a=Math.random()*Math.PI*2;
          spawn({x:CX(), y:CY(), vx:Math.cos(a)*150, vy:Math.sin(a)*150, r:8, dmg:6, shape:'diamond', bounce:true, life:dur}); } break; }
      case 'jevilCarousel':{ // tréboles orbitando que se expanden
        if(acc>0.5){ acc=0; for(let i=0;i<6;i++){ const a=el*2+i/6*Math.PI*2;
            spawn({x:CX()+Math.cos(a)*20, y:CY()+Math.sin(a)*20, vx:Math.cos(a)*80, vy:Math.sin(a)*80, r:6, dmg:5, shape:'club'}); } } break; }
      case 'jevilScythe':{ // guadañas (corazones) desde los lados
        if(acc>0.45){ acc=0; const top=Math.random()<.5; const x=b().x+10+Math.random()*(b().w-20);
          spawn({x, y:top?b().y-10:b().y+b().h+10, vx:(Math.random()-.5)*60, vy:top?160:-160, r:9, dmg:7, shape:'heart'}); } break; }

      case 'lancerWave':{ // columna de espadas en zig-zag
        if(acc>0.2){ acc=0; const x=CX()+Math.sin(el*3.2)*(b().w/2-16);
          spawn({x, y:b().y-10, vx:0, vy:130, r:7, dmg:5, shape:'spade'}); } break; }

      case 'kingCross':{ // espadas diagonales desde arriba
        if(acc>0.4){ acc=0; const left=Math.random()<.5;
          spawn({x:left?b().x-12:b().x+b().w+12, y:b().y-12, vx:(left?1:-1)*95, vy:120, r:7, dmg:6, shape:'spade'}); } break; }
      case 'kingHeartCage':{ // anillo de tréboles que se cierra con hueco
        if(acc>1.7){ acc=0; const gap=Math.random()*6.283, n=18;

function startEnemyTurn(){
  G.state='ENEMY'; G.bullets=[]; G.warns=[]; G.turnT=0; G.bossPulse=1;
  const A=G.boss.arena||{w:184,h:160};
  setBox(320-A.w/2, 316-A.h/2, A.w, A.h); G.soul.x=320; G.soul.y=316; G.trail=[];
  // escoger patrón del jefe AL AZAR (sin repetir el inmediato anterior)
  const pats=G.boss.patterns; let pi=0;
  if(pats.length>1){ do{ pi=Math.floor(Math.random()*pats.length); }while(pi===G.boss.lastPat); }
  G.boss.lastPat=pi; let name=pats[pi];
  // GRAN FINAL de NEO: bajo el 25% de vida desata su ataque definitivo
  if(G.boss.isNeo && G.boss.hp<=G.boss.max*0.25){ name='neoFinale';
    if(!G.boss.finaleSeen){ G.boss.finaleSeen=true; G.flash=0.7; floater(320,300,'¡EL GRAN FINAL!',C.wht); } }
  // objetivo único para el rey
  G.singleTarget = G.boss.targets ? G.order[(G.round)%G.order.length] : -1;
  // tipo de alma según el ataque:
  //   ROJA = libre · AZUL = gravedad+salto · VERDE = escudo direccional · MORADA = carriles
  G.soulMode = SOUL_PATS[name] || 'red';
  G.soulVy=0; G.onGround=false; G.shieldDir='up';
  const ax=320-A.w/2, ay=316-A.h/2;
  if(G.soulMode==='blue'){ G.soul.x=320; G.soul.y=ay+A.h-12; }
  else if(G.soulMode==='green'){ G.soul.x=320; G.soul.y=316; }
  else if(G.soulMode==='purple'){ const top=ay+24, bot=ay+A.h-24;
    G.rails=[top,(top+bot)/2,bot]; G.rail=1; G.soul.x=320; G.soul.y=G.rails[1]; }
  if(G.soulMode!=='red') floater(320,300, SOUL_HINT[G.soulMode], soulColor(G.soulMode));
  G.ctrl=makePattern(name, G.boss.dur);
}

/* =====================================================================
   UPDATE
   ===================================================================== */
function update(dt){
  G.t+=dt;
  const b=G.box,bt=G.boxT,k=Math.min(1,dt*12);
  b.x+=(bt.x-b.x)*k; b.y+=(bt.y-b.y)*k; b.w+=(bt.w-b.w)*k; b.h+=(bt.h-b.h)*k;
  if(G.shake>0)G.shake=Math.max(0,G.shake-dt*40);
  if(G.bossFlash>0)G.bossFlash-=dt;
  if(G.invuln>0)G.invuln-=dt;
  if(G.grazeGlow>0)G.grazeGlow=Math.max(0,G.grazeGlow-dt*3);
  if(G.bossEnter>0)G.bossEnter=Math.max(0,G.bossEnter-dt*1.7);
  if(G.bossKnock>0)G.bossKnock=Math.max(0,G.bossKnock-dt*5);
  if(G.bossPulse>0)G.bossPulse=Math.max(0,G.bossPulse-dt*2.4);
  if(G.flash>0)G.flash=Math.max(0,G.flash-dt*2.6);
  for(const f of G.floaters){ f.y-=dt*28; f.life-=dt; } G.floaters=G.floaters.filter(f=>f.life>0);
  for(const p of G.parts){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=p.g*dt; p.life-=dt; } G.parts=G.parts.filter(p=>p.life>0);

  switch(G.state){
    case 'TITLE': if(jp('confirm')){ ac(); if(AC&&AC.state==='suspended')AC.resume(); startGame(); } break;
    case 'STORY': updStory(); break;
    case 'MAP': updMap(); break;
    case 'PARTY_SELECT': updPartySelect(); break;
    case 'DIALOG': updDialog(dt); break;
    case 'CMD': updCmd(); break;
    case 'ACT_MENU': updList(G.boss.acts.length, i=>doAct(i)); break;
    case 'MAGIC_MENU': updList(curMember().spells.length, i=>castSpell(curMember().spells[i])); break;
    case 'ITEM_MENU': updList(G.items.length, i=>useItem(i)); break;
    case 'FIGHT': updFight(dt); break;
    case 'ENEMY': updEnemy(dt); break;
    case 'TRANSFORM': updTransform(dt); break;
    case 'DEFEAT': updDefeat(dt); break;
    case 'GAMEOVER': G.t2+=dt; if(jp('confirm')&&G.t2>1){ startBattle(G.floor); } break;
    case 'WIN': G.t2+=dt; if(jp('confirm')&&G.t2>1){ stopAllMusic(); G.state='TITLE'; } break;
  }
  clearPressed();
}

function updDialog(dt){ G.dlgShown+=dt*48; const full=G.dlg.length;
  if(G.dlgShown<full && Math.random()<0.6) sfx.blip();
  if(jp('confirm')){ if(G.dlgShown<full) G.dlgShown=full; else { const cb=G.dlgAfter; G.dlg=null; if(cb)cb(); } } }

function updCmd(){ const m=curMember(); const n=m.cmds.length;
  if(jp('left')){ G.menu=(G.menu+n-1)%n; sfx.move(); }
  if(jp('right')){ G.menu=(G.menu+1)%n; sfx.move(); }
  if(jp('confirm')){ sfx.sel(); G.sub=0; const cmd=m.cmds[G.menu];
    if(cmd==='LUCHA') doFight();
    else if(cmd==='ACTO') G.state='ACT_MENU';
    else if(cmd==='MAGIA'){ if(m.spells.length) G.state='MAGIC_MENU'; else dialog(m.name+' no tiene magia.',()=>{}); }
    else if(cmd==='OBJETO'){ if(G.items.length) G.state='ITEM_MENU'; else dialog('No quedan objetos.', toCmd); }
    else if(cmd==='PERDÓN') doSpare();
    else if(cmd==='DEFENDER') doDefend();
  }
  if(jp('cancel') && G.cur>0){ G.cur--; sfx.move(); toCmd(); } // volver al miembro anterior
}

function updList(count,onSel){ if(count===0){ toCmd(); return; }
  if(jp('up')){ G.sub=(G.sub+count-1)%count; sfx.move(); }
  if(jp('down')){ G.sub=(G.sub+1)%count; sfx.move(); }
  if(jp('cancel')){ sfx.move(); toCmd(); }
  if(jp('confirm')){ sfx.sel(); onSel(G.sub); } }

function updFight(dt){ const f=G.fight,b=G.box;
  if(f.phase==='bar'){ f.x+=f.dir*f.speed*dt;
    if(f.x>=b.x+b.w-14){ f.x=b.x+b.w-14; f.dir=-1; } if(f.x<=b.x+14){ f.x=b.x+14; f.dir=1; }
    f.t+=dt; if(jp('confirm')||jp('cancel')) resolveFightBar(); if(f.t>3.2) resolveFightBar();
  } else if(f.phase==='slash'){ f.t+=dt; if(f.t>0.45){ if(!hitBoss(f.dmg)){ f.phase='wait'; f.t=0; } } }
  else if(f.phase==='wait'){ f.t+=dt; if(f.t>0.55){ G.fight=null; nextMember(); } } }

function applyHit(bl){
  const targets = bl.single>=0 ? [G.party[bl.single]] : living();
  for(const m of targets){ if(!m||m.down) continue;
    let dmg=Math.max(1, bl.dmg - (m.defending?Math.ceil(bl.dmg/2):0) );
    m.hp-=dmg; if(m.hp<=0){ m.hp=0; m.down=true; }
  }
  G.invuln=0.9; G.shake=8; sfx.hurt(); floater(G.soul.x,G.soul.y-14,'-'+bl.dmg,heartCol);
  burst(G.soul.x,G.soul.y,20,heartCol,{sp:145,life:.55,r:3});
  if(living().length===0){ setGameOver(); }
}

function updEnemy(dt){ G.turnT+=dt;
  // avisos (telegrafía del rey)
  for(const w of G.warns){ w.t-=dt; if(w.t<=0){ w.onEnd&&w.onEnd(); w.dead=true; } }
  G.warns=G.warns.filter(w=>!w.dead);
  if(G.ctrl) G.ctrl.update(dt,G.turnT);
  // mover alma según su tipo
  const sp=175;
  if(G.soulMode==='blue'){            // AZUL: gravedad + salto (plataforma)
    if(keys.left)G.soul.x-=sp*dt; if(keys.right)G.soul.x+=sp*dt;
    G.soulVy+=1050*dt;
    if(jp('up') && G.onGround){ G.soulVy=-380; G.onGround=false; sfx.move(); }
    G.soul.y+=G.soulVy*dt;
    const fy=G.box.y+G.box.h-12;
    if(G.soul.y>=fy){ G.soul.y=fy; G.soulVy=0; G.onGround=true; } else G.onGround=false;
    clampSoul();
  } else if(G.soulMode==='green'){    // VERDE: alma fija al centro, las flechas giran el escudo
    G.soul.x=G.box.x+G.box.w/2; G.soul.y=G.box.y+G.box.h/2;
    if(jp('up'))G.shieldDir='up'; else if(jp('down'))G.shieldDir='down';
    else if(jp('left'))G.shieldDir='left'; else if(jp('right'))G.shieldDir='right';
  } else if(G.soulMode==='purple'){   // MORADA: pegada a carriles; ↑↓ cambian de carril
    const top=G.box.y+24, bot=G.box.y+G.box.h-24;
    G.rails=[top,(top+bot)/2,bot];
    if(keys.left)G.soul.x-=sp*dt; if(keys.right)G.soul.x+=sp*dt;
    if(jp('up') && G.rail>0){ G.rail--; sfx.move(); }
    if(jp('down') && G.rail<G.rails.length-1){ G.rail++; sfx.move(); }
    G.soul.y=G.rails[G.rail]; clampSoul();
  } else {                            // ROJA: libre
    if(keys.left)G.soul.x-=sp*dt; if(keys.right)G.soul.x+=sp*dt;
    if(keys.up)G.soul.y-=sp*dt; if(keys.down)G.soul.y+=sp*dt;
    clampSoul();
  }
  G.trail.push({x:G.soul.x,y:G.soul.y,life:.3}); if(G.trail.length>16)G.trail.shift();
  for(const tr of G.trail) tr.life-=dt; G.trail=G.trail.filter(t=>t.life>0);
  // balas
  for(const bl of G.bullets){
    bl.x+=bl.vx*dt; bl.y+=bl.vy*dt;
    if(bl.bounce){ const b=G.box;
      if(bl.x<b.x+bl.r){bl.x=b.x+bl.r;bl.vx*=-1;} if(bl.x>b.x+b.w-bl.r){bl.x=b.x+b.w-bl.r;bl.vx*=-1;}
      if(bl.y<b.y+bl.r){bl.y=b.y+bl.r;bl.vy*=-1;} if(bl.y>b.y+b.h-bl.r){bl.y=b.y+b.h-bl.r;bl.vy*=-1;}
      if(bl.life!==undefined){ bl.life-=dt; if(bl.life<=0) bl.dead=true; }
    }
    const dx=bl.x-G.soul.x, dy=bl.y-G.soul.y, d2=dx*dx+dy*dy;
    const hitR=bl.r+5, grazeR=hitR+14;
    // ESCUDO VERDE: si la bala llega por el lado protegido, la bloquea
    if(G.soulMode==='green'){ const blockR=hitR+22;
      if(d2<blockR*blockR){ const a=Math.atan2(dy,dx);
        const side = (a>=-0.785&&a<0.785)?'right' : (a>=0.785&&a<2.356)?'down' : (a>=-2.356&&a<-0.785)?'up' : 'left';
        if(side===G.shieldDir){ if(!bl.bounce) bl.dead=true; G.tp=Math.min(100,G.tp+5); G.grazeGlow=1;
          burst(bl.x,bl.y,5,'#5dd56a',{sp:80,life:.3,r:2}); if(Math.random()<0.4)sfx.graze(); continue; } } }
    if(G.invuln<=0 && d2<hitR*hitR){ applyHit(bl); if(!bl.bounce) bl.dead=true; }
    else if(d2<grazeR*grazeR){ G.tp=Math.min(100,G.tp+dt*14); G.grazeGlow=1; if(Math.random()<0.05){ sfx.graze(); burst(G.soul.x,G.soul.y,2,MAGCOL,{sp:50,life:.3,r:2}); } }
  }
  G.bullets=G.bullets.filter(bl=> !bl.dead && bl.x>-40&&bl.x<W+40&&bl.y>-40&&bl.y<H+40);
  if(G.state==='GAMEOVER') return;
  if(G.turnT>=G.boss.dur && G.bullets.length===0){ G.bullets=[]; beginRound(); }
  else if(G.turnT>=G.boss.dur+2.5){ G.bullets=[]; beginRound(); }
}

function updDefeat(dt){ G.t2+=dt; G.bossFade=Math.max(0,1-G.t2*1.2);
  if(G.t2>0.9 && !G.defeatDone){ G.defeatDone=true;
    G.cleared[G.floor]=true;
    let lines=[ G.result==='spare' ? (G.boss.spareText||'Has PERDONADO a '+G.boss.name+'.')
                                    : ('¡Has DERROTADO a '+G.boss.name+'!') ];
    // reclutamiento: SOLO si lo PERDONASTE (no si lo mataste)
    const r=G.roster.find(c=>c.key===G.boss.key);
    if(r && !r.unlocked && G.result==='spare'){ r.unlocked=true;
      lines.push('* '+r.name.toUpperCase()+' se ha unido a tu equipo. ¡Cámbialo en el mapa con [X]!');
      sfx.spare(); }
    if(G.cleared.every(Boolean)){
      lines.push('Habeis llegado al fondo del Reino de las Cartas.');
      lines.push('La grieta se cierra. La luz vuelve, despacio, piso a piso.');
      lines.push('Kris mira a Susie y a Ralsei. Nadie dice nada... no hace falta.');
      lines.push('Volvereis a casa. Pero este lugar, y los amigos que hicisteis, se quedan con vosotros.');
      dialogSeq(lines, ()=>{ G.state='WIN'; G.t2=0; sfx.win(); startBossMusic('win'); }); }
    else { const nf=G.cleared.findIndex(c=>!c);
      if(nf>=0) lines.push('Mas abajo os espera '+FLOORS[nf].name+'. '+FLOORS[nf].lore);
      dialogSeq(lines, ()=>{ G.floor=nf<0?0:nf; toMap(); }); }
  } }

   HITO 5 — HISTORIA · MAPA DE PISOS · RECLUTAMIENTO

 {name:'EL CAMPO DE ESPADAS', lore:'Praderas de naipes mecidos por un viento frío.'},

 {name:'EL VERTEDERO DE LA RED', lore:'El fondo del Reino. Aquí un Don Nadie sueña con cortar sus hilos...'},
];
const INTRO=[
 'Bajo el colegio, detras de una puerta olvidada, late un MUNDO OSCURO.',
 'Es el REINO DE LAS CARTAS: siete pisos que se derrumban uno tras otro.',
 'Tres Lightners cayeron dentro: KRIS, la callada de corazon valiente;',

function startGame(){
  G.roster=makeRoster(); G.sel=[0,1,2]; G.floor=0;
  G.cleared=BOSSES.map(()=>false); G.items=ITEMS_DEFAULT.map(o=>({...o})); G.tp=0; G.boss=null;
  dialogStory(INTRO, toMap);
}

function dialogSeq(lines, after){ let i=0;
  const step=()=>{ if(i<lines.length){ dialog(lines[i++], step); } else if(after) after(); };
  step(); }

function dialogStory(lines, after){ G.state='STORY'; G.story={lines:lines.slice(), i:0, shown:0, after:after||null}; }
function updStory(){ const s=G.story; if(!s) return; const full=s.lines[s.i].length;
  s.shown+=1.6; if(s.shown<full && Math.random()<0.5) sfx.blip();
  if(jp('confirm')){ if(s.shown<full){ s.shown=full; }
    else { s.i++; s.shown=0; if(s.i>=s.lines.length){ const cb=s.after; G.story=null; if(cb)cb(); } } } }

function toMap(){ G.state='MAP'; G.boss=null;
  G.floor=G.cleared.findIndex(c=>!c); if(G.floor<0) G.floor=BOSSES.length-1;
  G.mapCur=G.floor; buildParty(); }

function updMap(){
  if(jp('confirm')){ sfx.sel(); startBattle(G.floor); }
  else if(jp('cancel')){ sfx.move(); G.psCur=0; G.state='PARTY_SELECT'; } }

function updPartySelect(){ const R=G.roster, n=R.length;
  if(jp('up')){ G.psCur=(G.psCur+n-1)%n; sfx.move(); }
  if(jp('down')){ G.psCur=(G.psCur+1)%n; sfx.move(); }
  if(jp('confirm')){ const idx=G.psCur, c=R[idx];
    if(!c.unlocked){ sfx.hurt(); }
    else { const at=G.sel.indexOf(idx);
      if(at>=0){ if(G.sel.length>1){ G.sel.splice(at,1); sfx.move(); } else sfx.hurt(); }
      else if(G.sel.length<3){ G.sel.push(idx); sfx.sel(); }
      else sfx.hurt(); } }
  if(jp('cancel')){ sfx.move(); buildParty(); G.state='MAP'; } }

/* =====================================================================
   RENDER
   ===================================================================== */
function render(){ ctx.save();
  if(G.shake>0) ctx.translate((Math.random()-.5)*G.shake,(Math.random()-.5)*G.shake);
  ctx.fillStyle=C.blk; ctx.fillRect(-20,-20,W+40,H+40);

  if(G.state==='TITLE'){ renderTitle(); ctx.restore(); return; }
  if(G.state==='STORY'){ renderStory(); ctx.restore(); return; }
  if(G.state==='MAP'){ renderMap(); ctx.restore(); return; }
  if(G.state==='PARTY_SELECT'){ renderPartySelect(); ctx.restore(); return; }
  if(G.state==='GAMEOVER'){ renderGameOver(); ctx.restore(); return; }
  if(G.state==='WIN'){ renderWin(); ctx.restore(); return; }

  drawBackdrop();

  // jefe (centrado, con entrada/flinch/pulso)
  if(G.boss && G.bossFade>0 && G.bossEnter<1){
    const cy=BOSSY - G.bossEnter*120;
    const kx=G.bossKnock*Math.sin(G.t*45)*7;
    const scl=(1+G.bossPulse*0.07)*(1-G.bossKnock*0.06);
    ctx.globalAlpha=G.bossFade*(1-G.bossEnter);
    if(G.bossFlash>0 && Math.floor(G.t*30)%2===0){ drawBoss(G.boss.key,BOSSX+kx,cy,G.t,scl);
      ctx.globalCompositeOperation='source-atop'; ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fillRect(BOSSX-140,cy-150,280,300);
      ctx.globalCompositeOperation='source-over';
    } else drawBoss(G.boss.key,BOSSX+kx,cy,G.t,scl);
    ctx.globalAlpha=1;
    // nombre + barra de vida centrados arriba
    const bw=220,bh=11,bx=BOSSX-bw/2,by=46;
    font(17,'Press Start 2P'); ctx.fillStyle=G.boss.sparable?'#ffd23f':C.wht; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillText(G.boss.name, BOSSX, 36);
    ctx.fillStyle=C.g4; ctx.fillRect(bx,by,bw,bh);
    ctx.fillStyle = G.boss.sparable?'#ffd23f':'#ff4d4d'; ctx.fillRect(bx,by,bw*Math.max(0,G.boss.hp/G.boss.max),bh);
    ctx.strokeStyle=C.g2; ctx.lineWidth=1; ctx.strokeRect(bx,by,bw,bh);
    if(G.boss.sparable){ font(9,'Press Start 2P'); ctx.fillStyle='#ffd23f'; ctx.fillText('· PUEDE SER PERDONADO ·',BOSSX,by+24); }
  }

  // línea del jefe durante su turno (burbuja centrada)
  if(G.state==='ENEMY'){ font(22); ctx.textAlign='center'; ctx.textBaseline='middle';
    const bl=(G.boss.line2 && G.boss.hp<=G.boss.max*0.45)?G.boss.line2:G.boss.line;
    const ty=92, lw=ctx.measureText(bl).width;
    ctx.fillStyle=C.wht; ctx.fillRect(BOSSX-lw/2-12,ty-17,lw+24,34);
    ctx.fillStyle=C.blk; ctx.beginPath(); ctx.moveTo(BOSSX-8,ty+17); ctx.lineTo(BOSSX+8,ty+17); ctx.lineTo(BOSSX,ty+27); ctx.fill();
    ctx.fillStyle=C.wht; ctx.beginPath(); ctx.moveTo(BOSSX-7,ty+16); ctx.lineTo(BOSSX+7,ty+16); ctx.lineTo(BOSSX,ty+24); ctx.fill();
    ctx.fillStyle=C.blk; ctx.fillText(bl,BOSSX,ty); }

  if(G.state==='TRANSFORM') drawTransformFX();
  drawBox();
  if(G.state==='DIALOG') drawBoxDialog();
  else if(G.state==='FIGHT') drawFightBar();
  else if(G.state==='ENEMY') drawArena();
  else if(G.state==='ACT_MENU') drawList(G.boss.acts.map(a=>'* '+a.name));
  else if(G.state==='MAGIC_MENU') drawList(curMember().spells.map(s=>'* '+s.name+'  '+s.tp+'TP'));
  else if(G.state==='ITEM_MENU') drawList(G.items.map(i=>'* '+i.name+'  ('+i.heal+'PV)'));
  else if(G.state==='CMD') drawBoxPrompt();

  for(const p of G.parts){ const al=Math.max(0,p.life/p.max); ctx.globalAlpha=al; ctx.fillStyle=p.col;
    const r=p.r*(0.35+al*0.65); ctx.fillRect(p.x-r,p.y-r,r*2,r*2); } ctx.globalAlpha=1;

  for(const f of G.floaters){ font(26,'Press Start 2P'); ctx.textAlign='center'; ctx.fillStyle=f.col;
    ctx.globalAlpha=Math.min(1,f.life); ctx.fillText(f.txt,f.x,f.y); ctx.globalAlpha=1; }

  drawTP();
  drawPartyPanels();
  if(G.state==='CMD') drawCommands();
  ctx.restore();
}

function drawBackdrop(){
  // símbolos de baraja flotando al fondo (profundidad)
  for(const sy of BGSYM){ const y=((sy.y - G.t*sy.sp)%426+426)%426; const x=sy.x+Math.sin(G.t*0.5+sy.ph)*12;
    ctx.globalAlpha=0.06;
    if(sy.sh==='spade')spade(x,y,sy.s,C.g1); else if(sy.sh==='diamond')diamond(x,y,sy.s,C.g1);
    else if(sy.sh==='club')club(x,y,sy.s,C.g1); else heart(x,y,sy.s,C.g1); }
  ctx.globalAlpha=1;
  // rejilla tenue
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1; ctx.beginPath();
  for(let x=0;x<=W;x+=32){ ctx.moveTo(x+0.5,0); ctx.lineTo(x+0.5,406); }
  for(let y=0;y<=406;y+=32){ ctx.moveTo(0,y+0.5); ctx.lineTo(W,y+0.5); }
  ctx.stroke();
  // sombra bajo el jefe
  ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.beginPath(); ctx.ellipse(BOSSX,254,104,16,0,0,7); ctx.fill();
  // separador del HUD inferior
  ctx.strokeStyle=C.g4; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(0,407.5); ctx.lineTo(W,407.5); ctx.stroke();
}
function drawBox(){ const b=G.box; ctx.strokeStyle=C.wht; ctx.lineWidth=4;
  ctx.strokeRect(Math.round(b.x),Math.round(b.y),Math.round(b.w),Math.round(b.h));
  ctx.fillStyle=C.blk; ctx.fillRect(b.x+2,b.y+2,b.w-4,b.h-4); }

function drawBoxDialog(){ const b=G.box; font(26); ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillStyle=C.wht;
  const shown=G.dlg.substring(0,Math.floor(G.dlgShown));
  let y=b.y+20; for(const ln of wrap('* '+shown,b.w-48)){ ctx.fillText(ln,b.x+22,y); y+=28; } }
function drawBoxPrompt(){ const b=G.box; font(26); ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillStyle=C.wht;
  ctx.fillText('* '+curMember().name+', ¿qué harás?', b.x+22, b.y+20); }
function drawList(items){ const b=G.box; font(24); ctx.textAlign='left'; ctx.textBaseline='middle';
  let y=b.y+26; for(let i=0;i<items.length;i++){ ctx.fillStyle=C.wht; ctx.fillText(items[i],b.x+50,y);
    if(i===G.sub) heart(b.x+28,y,8,C.wht); y+=32; } }

function drawFightBar(){ const b=G.box,f=G.fight,cx=b.x+b.w/2,p=f.prof;
  // zona "perfecta" central resaltada
  const pz=(b.w/2)*(1-p.perfect)+6;
  ctx.fillStyle='rgba(255,210,63,.18)'; ctx.fillRect(cx-pz,b.y+8,pz*2,b.h-16);
  ctx.strokeStyle='rgba(255,210,63,.5)'; ctx.lineWidth=1; ctx.strokeRect(cx-pz,b.y+8,pz*2,b.h-16);
  ctx.strokeStyle='rgba(255,255,255,.4)'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx,b.y+8); ctx.lineTo(cx,b.y+b.h-8); ctx.stroke();
  if(f.phase==='bar'){
    ctx.fillStyle=C.wht; ctx.fillRect(f.x-3,b.y+8,6,b.h-16);
    font(13,'Press Start 2P'); ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillStyle=C.g1; ctx.fillText(p.label, cx, b.y+22);
    if(p.hits>1){ ctx.fillStyle='#ffd23f'; ctx.fillText('GOLPE '+(f.hit+1)+'/'+p.hits, cx, b.y+b.h-12); }
    font(16); ctx.fillStyle='rgba(255,255,255,.55)'; ctx.fillText('¡Z EN LA ZONA DORADA!',cx,b.y+b.h-30);
  } else { ctx.save(); ctx.translate(BOSSX,BOSSY); const p=Math.min(1,f.t/0.45);
    ctx.strokeStyle=C.wht; ctx.lineWidth=6; ctx.lineCap='round';
    for(let i=0;i<3;i++){ const off=(i-1)*26; ctx.globalAlpha=1-p; ctx.beginPath();
      ctx.moveTo(-70+off,-90+p*180); ctx.lineTo(70+off,-110+p*180); ctx.stroke(); }
    ctx.restore(); ctx.globalAlpha=1; } }

function drawArena(){
  const bx=G.box; ctx.save(); ctx.beginPath(); ctx.rect(bx.x+2,bx.y+2,bx.w-4,bx.h-4); ctx.clip();
  // avisos (telegrafía de rayos/pilares)
  for(const w of G.warns){ ctx.fillStyle = (Math.floor(G.t*20)%2===0)?'rgba(255,255,255,.6)':'rgba(255,255,255,.2)';
    ctx.fillRect(w.x-w.w/2,w.y,w.w,w.h); }
  for(const bl of G.bullets){ const rot=(bl.rot||0)+G.t*(bl.spin!=null?bl.spin:1.5);
    ctx.save(); ctx.translate(bl.x,bl.y);
    if(bl.shape==='spade'){ ctx.rotate(rot); spade(0,0,bl.r,C.wht,C.g3); }
    else if(bl.shape==='diamond'){ ctx.rotate(rot); diamond(0,0,bl.r,C.wht,C.g3); }
    else if(bl.shape==='club'){ ctx.rotate(rot); club(0,0,bl.r,C.wht); }
    else if(bl.shape==='heart'){ heart(0,0,bl.r,C.wht); }
    ctx.restore();
  }
  const mode=G.soulMode, soulCol=soulColor(mode);
  // AZUL: suelo visible (plataforma)
  if(mode==='blue'){ const fy=G.box.y+G.box.h-4; ctx.save(); ctx.strokeStyle='rgba(59,155,255,.55)'; ctx.lineWidth=2;
    ctx.setLineDash([6,5]); ctx.beginPath(); ctx.moveTo(G.box.x+3,fy); ctx.lineTo(G.box.x+G.box.w-3,fy); ctx.stroke(); ctx.restore(); }
  // MORADA: rieles/carriles visibles
  if(mode==='purple' && G.rails){ ctx.save(); ctx.strokeStyle='rgba(182,107,255,.4)'; ctx.lineWidth=2; ctx.setLineDash([5,5]);
    for(const ry of G.rails){ ctx.beginPath(); ctx.moveTo(G.box.x+3,ry); ctx.lineTo(G.box.x+G.box.w-3,ry); ctx.stroke(); } ctx.restore(); }
  // estela del alma
  const trCol = mode==='blue'?'#21506e' : mode==='green'?'#244a2a' : mode==='purple'?'#3d2a55' : '#7a2230';
  for(const tr of G.trail){ ctx.globalAlpha=tr.life*1.2; heart(tr.x,tr.y,7,trCol); } ctx.globalAlpha=1;
  // anillo de GRAZE
  ctx.save(); ctx.strokeStyle=MAGCOL; ctx.globalAlpha=0.28+G.grazeGlow*0.62; ctx.lineWidth=2;
  ctx.setLineDash([4,5]); ctx.lineDashOffset=-G.t*22;
  ctx.beginPath(); ctx.arc(G.soul.x,G.soul.y,22,0,7); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
  // VERDE: arco de escudo en el lado protegido
  if(mode==='green'){ const cen={up:-Math.PI/2,down:Math.PI/2,left:Math.PI,right:0}[G.shieldDir]||0;
    ctx.save(); ctx.strokeStyle='#5dd56a'; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath(); ctx.arc(G.soul.x,G.soul.y,18,cen-Math.PI/4,cen+Math.PI/4); ctx.stroke();
    ctx.globalAlpha=0.35; ctx.lineWidth=10; ctx.stroke(); ctx.restore(); }
  // alma (corazón) con leve pulso, coloreada según su tipo
  if(!(G.invuln>0 && Math.floor(G.t*20)%2===0)) heart(G.soul.x,G.soul.y,8+Math.sin(G.t*9)*0.8,soulCol);
  ctx.restore();
  // etiqueta de ayuda del tipo de alma (encima de la arena)
  if(mode!=='red'){ font(11,'Press Start 2P'); ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.fillStyle=soulCol; ctx.fillText(SOUL_HINT[mode], 320, G.box.y-9); }
}

function drawTransformFX(){ const p=Math.min(1,G.t2/3.4);
  ctx.save();
  // bandas de glitch que recorren al jefe mientras rompe sus hilos
  for(let i=0;i<16;i++){ if(Math.random()<0.45) continue;
    const y=BOSSY-140+((i*20+G.t2*140)%280), hh=2+Math.random()*8, off=(Math.random()-.5)*46*(1-p+0.25);
    ctx.globalAlpha=0.5; ctx.fillStyle=(i%2)?C.wht:C.g2; ctx.fillRect(BOSSX-92+off,y,184,hh); }
  ctx.globalAlpha=1;
  // hilos que se cortan (líneas que se rompen hacia afuera)
  if(G.t2<1.6){ ctx.strokeStyle=C.g1; ctx.lineWidth=1;
    for(let i=-3;i<=3;i++){ const br=Math.min(1,G.t2/1.4)*60; ctx.beginPath();
      ctx.moveTo(BOSSX+i*14, BOSSY-150); ctx.lineTo(BOSSX+i*14+(i)*br*0.4, BOSSY-110+br); ctx.stroke(); } }
  // texto destellante (estilo del jefe)
  ctx.textAlign='center'; ctx.textBaseline='middle';
  if(Math.floor(G.t2*9)%2===0){ font(24,'Press Start 2P'); ctx.fillStyle=C.wht;
    ctx.fillText(G.t2<1.5?'[[ NO MORE STRINGS ]]':'[[ BIG SHOT ]]', BOSSX, 224); }
  ctx.restore(); }

function drawTP(){ const x=12,y=232,w=26,h=170;
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  // etiqueta MAGIA (parpadea al cargar)
  font(12,'Press Start 2P'); ctx.fillStyle = G.grazeGlow>0?MAGCOL:C.wht;
  ctx.fillText('MAGIA', x+w/2, y-12);
  // marco y fondo
  ctx.strokeStyle=C.wht; ctx.lineWidth=2; ctx.strokeRect(x,y,w,h);
  ctx.fillStyle='#0e1d26'; ctx.fillRect(x+2,y+2,w-4,h-4);
  // relleno con degradado
  const fh=(h-4)*(G.tp/100);
  if(fh>0){ const g=ctx.createLinearGradient(0,y+h,0,y); g.addColorStop(0,'#1d6fa8'); g.addColorStop(1,MAGCOL);
    ctx.fillStyle=g; ctx.fillRect(x+2,y+h-2-fh,w-4,fh);
    ctx.fillStyle='rgba(255,255,255,.55)'; ctx.fillRect(x+2,y+h-2-fh,w-4,2); }
  // marcas cada 25%
  ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.lineWidth=1;
  for(let i=1;i<4;i++){ const yy=y+h-2-(h-4)*i/4; ctx.beginPath(); ctx.moveTo(x+2,yy); ctx.lineTo(x+w-2,yy); ctx.stroke(); }
  // valor
  font(12,'Press Start 2P'); ctx.fillStyle=MAGCOL; ctx.fillText(Math.floor(G.tp), x+w/2, y+h+16);
  // destello del marco al cargar
  if(G.grazeGlow>0){ ctx.save(); ctx.globalAlpha=G.grazeGlow*0.6; ctx.strokeStyle=MAGCOL; ctx.lineWidth=3;
    ctx.strokeRect(x-2,y-2,w+4,h+4); ctx.restore(); } }

function drawPartyPanels(){ const py=414,ph=58,pw=196,gap=8, x0=24;
  for(let i=0;i<G.party.length;i++){ const p=G.party[i]; const px=x0+i*(pw+gap);
    const active = (G.state==='CMD'||G.state==='ACT_MENU'||G.state==='MAGIC_MENU'||G.state==='ITEM_MENU'||G.state==='FIGHT')
                   && G.order[G.cur]===i;
    ctx.strokeStyle = active?C.wht:C.g3; ctx.lineWidth = active?3:2; ctx.strokeRect(px,py,pw,ph);
    // mini sprite
    ctx.save(); const pk=p.name.toLowerCase();
    if(p.down) ctx.globalAlpha=.4;
    const pim=heroImg(pk,G.t);
    if(pim){ drawSprite(pim, px+24, py+30, 44, G.t, {bob:1.5}); }
    else if(PARTY_SPRITE[p.name]){ ctx.translate(px+26,py+34); ctx.scale(.42,.42); PARTY_SPRITE[p.name](0,0,22,p.down); }
    else if(BOSS_SPRITE[p.key]){ ctx.translate(px+26,py+30); ctx.scale(.24,.24); BOSS_SPRITE[p.key](0,0,G.t); }
    ctx.restore();
    font(15,'Press Start 2P'); ctx.textAlign='left'; ctx.textBaseline='alphabetic';
    ctx.fillStyle = p.down?C.g3:C.wht; ctx.fillText(p.name.toUpperCase(), px+50, py+22);
    // barra hp
    const bx=px+50,bw=pw-64,bh=12,by=py+30;
    ctx.fillStyle=C.g4; ctx.fillRect(bx,by,bw,bh);
    const hpr=p.hp/p.max, hpc = p.down?C.g3 : hpr>0.5?'#5dd56a' : hpr>0.25?'#ffd23f':'#ff5050';
    ctx.fillStyle = hpc; ctx.fillRect(bx,by,bw*hpr,bh);
    font(13,'Press Start 2P'); ctx.fillStyle = p.down?C.g3:C.wht;
    ctx.fillText(p.down?'DOWN':(p.hp+'/'+p.max), px+50, py+ph-6);
    if(p.defending){ font(11,'Press Start 2P'); ctx.fillStyle=C.g1; ctx.fillText('DEF', px+pw-34, py+22); }
  }
}

function drawCommands(){ const m=curMember(), cmds=m.cmds; const y=372,h=30,gap=6;
  const total=W-300, x0=150, bw=(total-gap*(cmds.length-1))/cmds.length;
  for(let i=0;i<cmds.length;i++){ const x=x0+i*(bw+gap); const on=i===G.menu;
    ctx.strokeStyle=C.wht; ctx.lineWidth=on?3:2; ctx.strokeRect(x,y,bw,h);
    if(on){ ctx.fillStyle='rgba(255,255,255,.16)'; ctx.fillRect(x,y,bw,h); }
    font(11,'Press Start 2P'); ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=on?C.wht:C.g2; ctx.fillText(cmds[i],x+bw/2,y+h/2+1); } }

/* ---------- pantallas ---------- */
function renderTitle(){ drawBackdrop(); ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  const s=20+Math.sin(G.t*3)*3; heart(W/2,86,s,C.wht);
  // título con sombra para más cuerpo
  font(46,'Press Start 2P'); ctx.fillStyle=C.g4; ctx.fillText('WILD CARD',W/2+3,176);
  ctx.fillStyle=C.wht; ctx.fillText('WILD CARD',W/2,173);
  font(20); ctx.fillStyle=C.g1; ctx.fillText('· un descenso por el Reino de las Cartas ·',W/2,202);
  // los tres héroes en su forma del Mundo Oscuro
  const heroes=['kris','susie','ralsei'], hx=[W/2-110,W/2,W/2+110], hy=300;
  for(let i=0;i<3;i++){ const im=heroImg(heroes[i],G.t+i*0.4);
    if(im){ drawSprite(im,hx[i],hy,84,G.t+i,{shadow:true,bob:2}); }
    font(13,'Press Start 2P'); ctx.fillStyle=C.g1; ctx.fillText(heroes[i].toUpperCase(),hx[i],hy+34); }
  if(Math.floor(G.t*1.5)%2===0){ font(16,'Press Start 2P'); ctx.fillStyle=C.wht; ctx.fillText('PULSA Z PARA EMPEZAR',W/2,372); }
  font(18); ctx.fillStyle=C.g3;
  ctx.fillText(IS_TOUCH?'Botones en pantalla · Z confirmar · X atrás':'Flechas/WASD · Z confirmar · X atrás',W/2,438); }
function renderGameOver(){ ctx.textAlign='center';
  const c=W/2,y=160; heart(c-6,y,20,C.g3); heart(c+6,y,20,C.g3);
  ctx.strokeStyle=C.blk; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(c,y-26); ctx.lineTo(c+5,y); ctx.lineTo(c-5,y+14); ctx.lineTo(c+3,y+32); ctx.stroke();
  font(32,'Press Start 2P'); ctx.fillStyle=C.wht; ctx.fillText('GAME OVER',W/2,255);
  font(24); ctx.fillStyle=C.g1; ctx.fillText('* Toda tu fiesta ha caído.',W/2,305);
  if(G.t2>1&&Math.floor(G.t*1.5)%2===0){ font(16,'Press Start 2P'); ctx.fillStyle=C.wht; ctx.fillText('PULSA Z PARA REINTENTAR',W/2,370); } }
function renderWin(){ drawBackdrop(); ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  const s=22+Math.sin(G.t*4)*4; heart(W/2,70,s,C.wht);
  font(30,'Press Start 2P'); ctx.fillStyle=C.wht; ctx.fillText('FIN DEL DESCENSO',W/2,140);
  font(20); ctx.fillStyle=C.g1; ctx.fillText('El Reino de las Cartas vuelve a respirar.',W/2,172);
  // muestra a todos los amigos hechos en el viaje
  const friends=G.roster.filter(c=>c.unlocked);
  font(13,'Press Start 2P'); ctx.fillStyle=C.g2; ctx.fillText('TU VIAJE, TUS AMIGOS',W/2,212);
  const cw=Math.min(86,(W-40)/friends.length), x0=W/2-(friends.length*cw)/2+cw/2, y=276;
  for(let i=0;i<friends.length;i++){ const c=friends[i], cx=x0+i*cw;
    drawMini(c,cx,y,46); font(10,'Press Start 2P'); ctx.fillStyle=C.g1; ctx.fillText(c.name.toUpperCase(),cx,y+30); }
  font(16); ctx.fillStyle=C.g1; ctx.fillText('Nadie tuvo que quedarse solo.',W/2,346);
  if(G.t2>1&&Math.floor(G.t*1.5)%2===0){ font(14,'Press Start 2P'); ctx.fillStyle=C.wht; ctx.fillText('PULSA Z PARA VOLVER AL INICIO',W/2,400); } }

/* ---------- HITO 5: pantallas de historia / mapa / equipo ---------- */
function renderStory(){ drawBackdrop(); ctx.textBaseline='alphabetic';
  ctx.textAlign='center'; font(16,'Press Start 2P'); ctx.fillStyle=C.g3; ctx.fillText('· REINO DE LAS CARTAS ·',W/2,72);
  const s=G.story; if(!s) return;
  font(28); ctx.fillStyle=C.wht; ctx.textAlign='left'; ctx.textBaseline='top';
  const shown=s.lines[s.i].substring(0,Math.floor(s.shown));
  let y=190; for(const ln of wrap(shown,520)){ ctx.fillText(ln,60,y); y+=32; }
  ctx.textAlign='center'; font(13,'Press Start 2P'); ctx.fillStyle=C.g2;
  ctx.fillText((s.i+1)+' / '+s.lines.length, W/2, 360);
  if(Math.floor(G.t*1.5)%2===0){ ctx.fillStyle=C.wht; ctx.fillText('Z PARA CONTINUAR', W/2, 420); } }

function drawMini(c,cx,cy,h){ ctx.save();
  const mim=heroImg(c.key,G.t);
  if(mim) drawSprite(mim,cx,cy,h,G.t,{bob:1});
  else if(PARTY_SPRITE[c.name]){ ctx.translate(cx,cy+h*0.18); ctx.scale(h/110,h/110); PARTY_SPRITE[c.name](0,0,22,false); }
  else if(BOSS_SPRITE[c.key]){ ctx.translate(cx,cy+h*0.32); ctx.scale(h/190,h/190); BOSS_SPRITE[c.key](0,0,G.t); }
  ctx.restore(); }

function drawRosterBar(){ const sel=G.sel, cw=110, total=sel.length*cw, x0=(W-total)/2, y=426;
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  font(12,'Press Start 2P'); ctx.fillStyle=C.g2; ctx.fillText('TU EQUIPO',W/2,408);
  for(let k=0;k<sel.length;k++){ const c=G.roster[sel[k]], cx=x0+cw*k+cw/2;
    drawMini(c,cx,y,38);
    font(12,'Press Start 2P'); ctx.fillStyle=C.wht; ctx.fillText(c.name.toUpperCase(),cx,y+34); } }

function renderMap(){ drawBackdrop(); ctx.textBaseline='alphabetic';
  ctx.textAlign='center'; font(22,'Press Start 2P'); ctx.fillStyle=C.wht; ctx.fillText('EL DESCENSO',W/2,40);
  const cleared=G.cleared.filter(Boolean).length, n=BOSSES.length;
  font(12,'Press Start 2P'); ctx.fillStyle=C.g2; ctx.fillText('REINO DE LAS CARTAS  ·  '+cleared+' / '+n+' PISOS SUPERADOS', W/2, 58);
  const x=178, y0=86, dy=40;
  ctx.strokeStyle=C.g4; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(x,y0); ctx.lineTo(x,y0+(n-1)*dy); ctx.stroke();
  for(let i=0;i<n;i++){ const y=y0+i*dy, done=G.cleared[i], cur=(i===G.floor), reached=done||cur;
    ctx.fillStyle = done?C.g1 : cur?C.wht : C.g4;
    ctx.beginPath(); ctx.arc(x,y,cur?11:8,0,7); ctx.fill();
    if(cur){ ctx.strokeStyle=C.wht; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y,15+Math.sin(G.t*4)*1.5,0,7); ctx.stroke();
      drawMini(BOSSES[i],x,y,30); }
    font(13,'Press Start 2P'); ctx.textAlign='right'; ctx.fillStyle=reached?C.wht:C.g3; ctx.fillText('P'+(i+1), x-26, y+5);
    font(18); ctx.textAlign='left'; ctx.fillStyle = done?C.g2 : cur?C.wht : C.g3;
    ctx.fillText(reached?FLOORS[i].name:'? ? ?', x+26, y+1);
    font(13); ctx.fillStyle = cur?C.g1:C.g3;
    if(reached) ctx.fillText(done?('jefe: '+BOSSES[i].name):FLOORS[i].lore, x+26, y+16);
    if(done){ font(11,'Press Start 2P'); ctx.fillStyle='#5dd56a'; ctx.textAlign='right'; ctx.fillText('LISTO', W-30, y+1); }
    else if(cur){ font(11,'Press Start 2P'); ctx.fillStyle=C.wht; ctx.textAlign='right'; ctx.fillText('AQUI >', W-30, y+1); }
    // medidor de peligro (sube con cada piso)
    if(reached){ const dn=Math.min(7,i+1); for(let k=0;k<dn;k++){ const dx=W-34-k*9;
      diamond(dx,y+15,3,(done||cur)?'#ff5050':C.g3); } } }
  drawRosterBar();
  ctx.textAlign='center'; if(Math.floor(G.t*1.5)%2===0){ font(12,'Press Start 2P'); ctx.fillStyle=C.wht;
    ctx.fillText('Z DESCENDER (PISO '+(G.floor+1)+')   ·   X ELEGIR EQUIPO', W/2, 392); } }

function renderPartySelect(){ drawBackdrop(); ctx.textBaseline='alphabetic';
  ctx.textAlign='center'; font(18,'Press Start 2P'); ctx.fillStyle=C.wht; ctx.fillText('ELIGE TU EQUIPO (MAX 3)',W/2,38);
  const R=G.roster, x=70, y0=78, dy=42;
  for(let i=0;i<R.length;i++){ const c=R[i], y=y0+i*dy, cur=i===G.psCur, inParty=G.sel.indexOf(i)>=0;
    if(cur){ ctx.fillStyle='rgba(255,255,255,.12)'; ctx.fillRect(34,y-17,W-68,36); }
    ctx.strokeStyle=c.unlocked?C.wht:C.g4; ctx.lineWidth=2; ctx.strokeRect(x,y-11,22,22);
    if(inParty){ ctx.fillStyle=MAGCOL; ctx.fillRect(x+4,y-7,14,14); }
    if(c.unlocked) drawMini(c,x+52,y,30);
    font(18); ctx.textAlign='left'; ctx.fillStyle = !c.unlocked?C.g3 : inParty?MAGCOL : C.wht;
    ctx.fillText(c.unlocked?c.name:'? ? ?  (bloqueado)', x+78, y-3);
    if(c.unlocked){ font(15); ctx.fillStyle=C.g2; ctx.fillText('PV '+c.max+'  ATK '+c.atk+'  ·  '+c.bio, x+78, y+15); } }
  ctx.textAlign='center'; font(12,'Press Start 2P'); ctx.fillStyle=C.wht;
  ctx.fillText('ARRIBA/ABAJO mover  ·  Z anadir/quitar  ·  X volver al mapa', W/2, 462); }

/* ---------- overlays de presentación (flash + viñeta + scanlines) ---------- */
let scanPat=null;
function makeScan(){ const c=document.createElement('canvas'); c.width=4; c.height=4;
  const x=c.getContext('2d'); x.fillStyle='rgba(0,0,0,0.12)'; x.fillRect(0,3,4,1); return ctx.createPattern(c,'repeat'); }
function drawOverlays(){
  // flash de impacto / entrada
  if(G.flash>0){ ctx.save(); ctx.globalAlpha=Math.min(1,G.flash); ctx.fillStyle=C.wht; ctx.fillRect(0,0,W,H); ctx.restore(); }
  // scanlines suaves
  if(scanPat===null){ try{ scanPat=makeScan(); }catch(e){ scanPat=false; } }
  if(scanPat){ ctx.fillStyle=scanPat; ctx.fillRect(0,0,W,H); }
  // viñeta (oscurece bordes para dar foco)
  const g=ctx.createRadialGradient(W/2,H/2,H*0.4,W/2,H/2,H*0.82);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,0.42)');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
}

/* ---------- bucle ---------- */
let last=performance.now();
function loop(now){ const dt=Math.min(0.05,(now-last)/1000); last=now; update(dt); render(); drawOverlays(); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
